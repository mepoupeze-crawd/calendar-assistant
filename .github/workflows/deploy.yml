name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: calendar
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            cd /opt/calendar-assistant

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing production dependencies..."
            npm install --omit=dev

            echo "==> Restarting calendar-bot service..."
            sudo systemctl restart calendar-bot

            echo "==> Waiting for service to stabilise..."
            sleep 5

            echo "==> Checking service status..."
            sudo systemctl status calendar-bot --no-pager -l
            if sudo systemctl is-failed --quiet calendar-bot; then
              echo "ERROR: calendar-bot service is in a failed state." >&2
              exit 1
            fi

      - name: Show last 20 log lines
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: calendar
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            journalctl -u calendar-bot -n 20 --no-pager
